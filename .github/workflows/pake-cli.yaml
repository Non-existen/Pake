name: HearSilence Ultimate Builder
env:
  NODE_VERSION: "22"

on:
  workflow_dispatch:
    inputs:
      url:
        description: "网站地址 (URL)"
        required: true
        default: "https://tingjianjijing.com"
      name:
        description: "应用名称 (Name)"
        required: true
        default: "HearSilence"
      app_version:
        description: "版本号 (Version)"
        default: "1.2.0"
      icon:
        description: "图标地址 (Direct URL)"
        default: "https://cdn-icons-png.flaticon.com"
      internal_url_regex:
        description: "内部链接正则"
        default: ".*(tingjianjijing\.com|jijing\.sbs).*"
      force_internal:
        description: "全内部导航 (Force Navigation)"
        type: boolean
        default: true
      show_system_tray:
        description: "启用系统托盘 (System Tray)"
        type: boolean
        default: true
      hide_on_close:
        description: "点击关闭隐藏至托盘 (Hide on Close)"
        type: boolean
        default: true
      activation_shortcut:
        description: "唤起快捷键 (Shortcut)"
        default: "Control+Shift+S"

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Windows App
        shell: pwsh
        run: |
          # 1. 初始化参数数组
          $pakeArgs = @("${{ inputs.url }}", "--name", "${{ inputs.name }}")
          
          # 2. 注入所有 Inputs 选项
          $pakeArgs += "--app-version", "${{ inputs.app_version }}"
          $pakeArgs += "--targets", "exe,7z"
          $pakeArgs += "--activation-shortcut", "${{ inputs.activation_shortcut }}"
          $pakeArgs += "--internal-url-regex", '${{ inputs.internal_url_regex }}'
          
          if ("${{ inputs.force_internal }}" -eq "true") { $pakeArgs += "--force-internal-navigation" }
          if ("${{ inputs.show_system_tray }}" -eq "true") { $pakeArgs += "--show-system-tray" }
          if ("${{ inputs.hide_on_close }}" -eq "true") { $pakeArgs += "--hide-on-close" }
          
          if ("${{ inputs.icon }}" -ne "") {
              $pakeArgs += "--icon", "${{ inputs.icon }}"
              if ("${{ inputs.show_system_tray }}" -eq "true") {
                  $pakeArgs += "--system-tray-icon", "${{ inputs.icon }}"
              }
          }

          # 3. 执行打包
          Write-Host "Executing: pake $($pakeArgs -join ' ')"
          pake @pakeArgs
          
          # 4. 打印目录结构以便调试
          Write-Host "--- Post-build directory check ---"
          Get-ChildItem -Recurse -Include *.exe, *.msi, *.7z | Select-Object FullName

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-Windows-Final
          # 使用递归通配符，确保能抓到任何子目录下的安装包
          path: |
             **/*.exe
             **/*.msi
             **/*.7z
          retention-days: 7
