name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"
  
on:
  workflow_dispatch:
    inputs:
      url:
        description: "网站地址"
        required: true
        default: "https://tingjianjijing.com"
      name:
        description: "应用名称"
        required: true
        default: "HearSilence"
      internal_regex:
        description: "内部正则(不带引号)"
        default: ".*tingjianjijing.*"
      force_internal:
        description: "全内部导航"
        type: boolean
        default: true
      show_tray:
        description: "显示托盘"
        type: boolean
        default: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        shell: pwsh
        run: |
          npm install -g pake-cli
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"
          $args += "--app-version", "1.2.0"
          $args += "--targets", "exe,7z"
          $args += "--internal-url-regex", "${{ inputs.internal_regex }}"
          $args += "--activation-shortcut", "Control+Shift+S"
          $args += "--hide-on-close"
          
          if ("${{ inputs.force_internal }}" -eq "true") { $args += "--force-internal-navigation" }
          if ("${{ inputs.show_tray }}" -eq "true") { $args += "--show-system-tray" }
          
          pake $args

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HearSilence-Windows
          path: |
            *.exe
            *.msi
            *.7z
